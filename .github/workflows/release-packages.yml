name: release-packages

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build packages
    uses: ./.github/workflows/build-packages.yml

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: |
            openwrt-24.10-packages
            SNAPSHOT-packages
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            *.ipk
            *.apk