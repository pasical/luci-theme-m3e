name: build-packages

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    name: ${{ matrix.branch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            branch: openwrt-24.10
            artifact_name: openwrt-24.10-ipk
            package_glob: '*.ipk'
          - arch: x86_64
            branch: SNAPSHOT
            artifact_name: snapshot-apk
            package_glob: '*.apk'

    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          path: ${{ github.event.repository.name }}

      - name: build
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.branch }}
          PACKAGES: ${{ github.event.repository.name }}
          NO_REFRESH_CHECK: true

      - name: normalize and validate ipk
        if: matrix.branch == 'openwrt-24.10'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=(bin/packages/${{ matrix.arch }}/action/*.ipk)

          if [[ ${#packages[@]} -eq 0 ]]; then
            echo "No .ipk package produced for ${{ matrix.branch }}"
            exit 1
          fi

          for pkg in "${packages[@]}"; do
            echo "Checking $pkg"

            # Already a standard ipk (ar archive)
            if ar t "$pkg" >/dev/null 2>&1; then
              echo "Valid ar/ipk: $pkg"
              continue
            fi

            # Some builds may produce a gzip-wrapped payload containing ipk members.
            # Repack it into a standard ar/ipk so opkg can install it directly.
            if file "$pkg" | grep -qi 'gzip compressed'; then
              tmpdir="$(mktemp -d)"
              trap 'rm -rf "$tmpdir"' EXIT

              tar -xzf "$pkg" -C "$tmpdir" || {
                echo "Failed to unpack gzip payload: $pkg"
                exit 1
              }

              if [[ -f "$tmpdir/debian-binary" && -f "$tmpdir/control.tar.gz" && -f "$tmpdir/data.tar.gz" ]]; then
                repacked="$pkg.repacked"
                ar r "$repacked" "$tmpdir/debian-binary" "$tmpdir/control.tar.gz" "$tmpdir/data.tar.gz" >/dev/null
                mv "$repacked" "$pkg"
                echo "Repacked to ar/ipk: $pkg"
              else
                echo "Unsupported gzip payload layout in $pkg"
                ls -la "$tmpdir"
                exit 1
              fi

              rm -rf "$tmpdir"
              trap - EXIT
            else
              echo "Unsupported package format for $pkg"
              file "$pkg"
              exit 1
            fi

            # Final hard check
            ar t "$pkg" >/dev/null
          done

      - name: upload
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            bin/packages/${{ matrix.arch }}/action/${{ matrix.package_glob }}
          if-no-files-found: error